# Job efemero pra build + deploy do A03AP01 (frontend Angular 21 + pnpm 10)
# no PVC EFS que o nginx ja serve. Disparado pelo workflow
# version/.github/workflows/deploy-frontend.yml.
#
# Diferenças do legado (.github/k8s/frontend/deploy-job.yaml do backend):
# - Clona cloudfysystems/Frontend (repo novo Angular 21) em vez de ANGULAR
# - Usa pnpm 10 em vez de npm
# - Build com `pnpm build:corp` (lib) + `pnpm build:a03ap01` (app)
# - Output: dist/a03ap01/browser/ (Angular 21 builder, nao webpack)
# - Imagem: node:24-bookworm-slim (em vez de node:14-bullseye-slim do legado)
#
# Substituicoes envsubst antes de `kubectl apply -f -`:
#   ${BRANCH} ${SHORT_SHA}
#
# Pre-requisitos no cluster (criados pelo workflow antes do apply):
#   - Secret `cross-repo-token-${SHORT_SHA}` com chave `token` (PAT do GitHub
#     com acesso a cloudfysystems/Frontend)
#   - ConfigMap opcional `frontend-conf-a03ap01` com chave `Prod.ts`
#     (so existe se a Variable CONF_A03AP01 estiver setada no environment)
apiVersion: batch/v1
kind: Job
metadata:
    name: deploy-frontend-a03ap01-${SHORT_SHA}
    labels:
        app: frontend-a03ap01
        deploy-job: 'true'
spec:
    backoffLimit: 1
    activeDeadlineSeconds: 1800   # 30min — pnpm install + build Angular 21 (corp + a03ap01)
    ttlSecondsAfterFinished: 3600 # 1h pra inspecao manual pos-falha
    template:
        metadata:
            labels:
                app: frontend-a03ap01
                deploy-job: 'true'
        spec:
            restartPolicy: Never
            containers:
                - name: build
                  # Node 24 LTS — alinhado com engines.node do package.json do
                  # Frontend novo (>=20.19). Bookworm e estavel pra builds Angular.
                  image: node:24-bookworm-slim
                  workingDir: /workspace
                  env:
                      - { name: APP,    value: 'a03ap01' }
                      - { name: BRANCH, value: '${BRANCH}' }
                      - name: GITHUB_TOKEN
                        valueFrom:
                            secretKeyRef:
                                # Secret SHA-ed pra cada run — evita race entre
                                # runs paralelas que disputariam um nome global.
                                # Trap do workflow deleta apenas o seu apos rodar.
                                name: cross-repo-token-${SHORT_SHA}
                                key: token
                  command: ['/bin/bash', '-c']
                  args:
                      - |
                          set -euxo pipefail

                          # 1. Tooling em runtime — git + rsync nao vem na imagem slim.
                          # python3/make/g++ pra eventuais native bindings (esbuild,
                          # @parcel/watcher etc).
                          apt-get update -qq
                          apt-get install -y --no-install-recommends \
                              git rsync ca-certificates curl \
                              python3 make g++ >/dev/null

                          # 2. Habilita pnpm 10 via corepack
                          corepack enable
                          corepack prepare pnpm@10 --activate
                          pnpm --version

                          # 3. Clone do repo Frontend (Angular 21 novo)
                          git clone --depth 1 --branch "${BRANCH}" \
                              "https://x-access-token:${GITHUB_TOKEN}@github.com/cloudfysystems/Frontend.git" .

                          # 4. Override do Prod.ts via ConfigMap (se a Variable
                          # CONF_A03AP01 esta setada no environment; senao, pula
                          # e usa o Prod.ts default do repo).
                          if [ -f /conf/Prod.ts ]; then
                              echo "Aplicando override de env do GitHub Variable CONF_A03AP01"
                              cp /conf/Prod.ts apps/a03ap01/src/ambiente/Prod.ts
                          else
                              echo "Sem CONF_A03AP01 setada — usando Prod.ts default do repo"
                          fi

                          # 5. Install + build (corp primeiro, depois app)
                          pnpm install --frozen-lockfile
                          pnpm build:corp
                          pnpm build:a03ap01    # = ng build a03ap01 --configuration=production

                          # 6. Sanity check do output
                          DIST_DIR="dist/a03ap01/browser"
                          if [ ! -d "${DIST_DIR}" ]; then
                              echo "::error::Diretorio de dist '${DIST_DIR}' nao existe apos build"
                              ls -la dist/ || true
                              ls -la dist/a03ap01/ || true
                              exit 1
                          fi
                          if [ -z "$(ls -A "${DIST_DIR}")" ]; then
                              echo "::error::Diretorio de dist '${DIST_DIR}' esta vazio"
                              exit 1
                          fi

                          # 7. rsync sem -ogp — EFS Access Point bloqueia chown
                          mkdir -p /pvc/A03AP01
                          rsync -rlt --omit-dir-times --delete \
                                --no-owner --no-group --no-perms \
                                "${DIST_DIR}/" /pvc/A03AP01/

                          echo "deploy frontend a03ap01 ok"
                  volumeMounts:
                      - name: pvc
                        mountPath: /pvc
                      - name: conf
                        mountPath: /conf
                        readOnly: true
            volumes:
                - name: pvc
                  persistentVolumeClaim:
                      claimName: frontendpvc
                - name: conf
                  # ConfigMap criado pelo workflow se Variable CONF_A03AP01 existe
                  # no environment. `optional: true` — se nao existir, mount fica
                  # vazio e build usa Prod.ts default do repo.
                  configMap:
                      name: frontend-conf-a03ap01
                      optional: true
