          cat "$VERSION_FILE"

      # Renomear ícone para minúsculo (Linux é case-sensitive)
      - name: Renomear Icone-azul.png para icone-azul.png
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        run: |
          if [ -f "assets/appicon/Icone-azul.png" ]; then
            mv "assets/appicon/Icone-azul.png" "assets/appicon/icone-azul.png"
            echo "✅ Ícone renomeado para minúsculo"
          else
            echo "Arquivo já está em minúsculo ou não encontrado"
          fi

      # Criar o arquivo env/prod.json
      - name: Gerar env/prod.json
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        run: |
          mkdir -p ./env
          echo '${{ secrets.ENV_PROD }}' > ./env/prod.json
          cat ./env/prod.json

      # Atualizar versão no arquivo Dart
      - name: Atualiza versão no arquivo Dart e pubspec.yaml
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        shell: bash
        run: |
          FILE="lib/Environment/Version.dart"
          NOVA_VERSAO="${{ env.VERSAO }}"
          sed -i "s/const String Version = \".*\"/const String Version = \"$NOVA_VERSAO\"/" $FILE
          cat lib/Environment/Version.dart
          sed -i "s/^version:.*/version: $VERSAO+${{ env.VERSAO_BUILD }}/" pubspec.yaml
          cat pubspec.yaml

      # Instalar dependências do Linux para build Flutter
      - name: Instalar dependências Linux
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
          sudo apt-get install -y libayatana-appindicator3-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libcurl4-openssl-dev libblkid-dev
          sudo apt-get install -y rpm patchelf locate libfuse2

      # Setup Flutter
      - name: Setup Flutter
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{vars.FLUTTER_VERSION_SDK_WINDOWS}}
          channel: stable
          cache: true

      # Instalar fastforge para gerar .deb e .rpm
      - name: Instalar fastforge
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        run: dart pub global activate fastforge

      # Gerar pacote .deb
      - name: Gerar pacote .deb
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        run: fastforge package --platform linux --targets deb --flutter-build-args dart-define-from-file=env/prod.json --flutter-build-args enable-impeller=false

      # Gerar pacote .rpm
      - name: Gerar pacote .rpm
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        run: fastforge package --platform linux --targets rpm --skip-clean --flutter-build-args dart-define-from-file=env/prod.json --flutter-build-args enable-impeller=false

      # Renomear arquivos
      - name: Renomear arquivos Linux
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        working-directory: .
        run: |
          echo "Procurando .deb gerado..."
          DEB_FILE=$(find flutter/speed/dist/ -name "*.deb" | head -1)
          if [ -n "$DEB_FILE" ]; then
            mv "$DEB_FILE" flutter/speed/dist/CloudfySpeedyPos.deb
            echo "✅ DEB renomeado para CloudfySpeedyPos.deb"
          else
            echo "⚠️ Arquivo .deb não encontrado!"
          fi

          echo "Procurando .rpm gerado..."
          RPM_FILE=$(find flutter/speed/dist/ -name "*.rpm" | head -1)
          if [ -n "$RPM_FILE" ]; then
            mv "$RPM_FILE" flutter/speed/dist/CloudfySpeedyPos.rpm
            echo "✅ RPM renomeado para CloudfySpeedyPos.rpm"
          else
            echo "⚠️ Arquivo .rpm não encontrado!"
          fi

      - name: Criando o release
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSAO }}_SpeedyLinux
          name: v${{ env.VERSAO }}_SpeedyLinux
          files: |
            flutter/speed/dist/CloudfySpeedyPos.deb
            flutter/speed/dist/CloudfySpeedyPos.rpm
          body: Release gerado automaticamente.
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Chamar API de alteração de dados Linux DEB
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        run: |
          URLLINUX="https://github.com/cloudfysystems/Version/releases/download/v${{ env.VERSAO }}_SpeedyLinux/CloudfySpeedyPos.deb"
          echo "$URLLINUX"
          echo "Chamando API de validação DEB..."

          JSON_DATA=$(cat <<EOF
          {
            "JSON": true,
            "Parameters": {
              "Versao": "${{ env.VERSAO }}",
              "PSW": "${{ secrets.SENHA_API_ALTERAR_URL }}",
              "URL": "$URLLINUX",
              "NR_ID": 23
            }
          }
          EOF
          )

          echo $JSON_DATA

          response=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST https://api.cloudfy.net.br/H02SF0107A \
            -H "Content-Type: application/json" \
            -d "$JSON_DATA")

          echo "Código HTTP: $response"
          cat response.txt

          if [ "$response" != "200" ]; then
            echo "❌ Falha na chamada da API DEB. Abortando workflow."
            exit 1
          fi

      - name: Chamar API de alteração de dados Linux RPM
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        run: |
          URLLINUX="https://github.com/cloudfysystems/Version/releases/download/v${{ env.VERSAO }}_SpeedyLinux/CloudfySpeedyPos.rpm"
          echo "$URLLINUX"
          echo "Chamando API de validação RPM..."

          JSON_DATA=$(cat <<EOF
          {
            "JSON": true,
            "Parameters": {
              "Versao": "${{ env.VERSAO }}",
              "PSW": "${{ secrets.SENHA_API_ALTERAR_URL }}",
              "URL": "$URLLINUX",
              "NR_ID": 24
            }
          }
          EOF
          )

          echo $JSON_DATA

          response=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST https://api.cloudfy.net.br/H02SF0107A \
            -H "Content-Type: application/json" \
            -d "$JSON_DATA")

          echo "Código HTTP: $response"
          cat response.txt

          if [ "$response" != "200" ]; then
            echo "❌ Falha na chamada da API RPM. Abortando workflow."
            exit 1
          fi

      - name: Atualizar branch com merge (se necessário)
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        working-directory: version-repo
        run: |
          git config user.name "cloudfysystems"
          git config user.email "cloudfysystems@gmail.com"

          git branch --show-current

          git pull origin HEAD --no-rebase || true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit das alterações
        uses: EndBug/add-and-commit@v9
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        with:
          author_name: cloudfysystems
          author_email: cloudfysystems@gmail.com
          message: "alterada versão do build Linux"
          cwd: ./version-repo
          add: "versionLinux.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

  #Job que vai atualizar o git, sincronizar os fontes
  FinishJob:
    needs:
      [
        Windows,
        android-rede,
        android-rede-n960k,
        android-cielo,
        android-pagseguro,
        android-getnet,
        android-tef,
        android-prod,
        android-stone,
        android-ifood,
        ios,
        macos,
        linux,
      ]
    runs-on: ubuntu-latest
    if: ${{ inputs.email}}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./flutterrepo

    steps:
      - name: Calculando a combinação dos booleans Android
        id: compute
        working-directory: .
        run: |
          WINDOWS=${{ github.event.inputs.windows }}
          ANDROID=${{ github.event.inputs.android }}
          TEF=${{ github.event.inputs.android-tef }}
          PAGSEGURO=${{ github.event.inputs.android-pagseguro }}
          GETNET=${{ github.event.inputs.android-getnet }}
          CIELO=${{ github.event.inputs.android-cielo }}
          REDE=${{ github.event.inputs.android-rede }}
          REDEN960K=${{ github.event.inputs.android-rede-n960k }}
          STONE=${{ github.event.inputs.android-stone }}
          IOS=${{ github.event.inputs.ios }}
          IFOOD=${{ github.event.inputs.android-ifood }}
          MACOS=${{ github.event.inputs.macos }}
          LINUX=${{ github.event.inputs.linux }}



          # Converte string para 0/1
          if [ "$ANDROID" = "true" ]; then ANDROID_BOOL=1; else ANDROID_BOOL=0; fi
          if [ "$TEF" = "true" ]; then TEF_BOOL=1; else TEF_BOOL=0; fi
          if [ "$PAGSEGURO" = "true" ]; then PAGSEGURO_BOOL=1; else PAGSEGURO_BOOL=0; fi
          if [ "$GETNET" = "true" ]; then GETNET_BOOL=1; else GETNET_BOOL=0; fi
          if [ "$CIELO" = "true" ]; then CIELO_BOOL=1; else CIELO_BOOL=0; fi
          if [ "$REDE" = "true" ]; then REDE_BOOL=1; else REDE_BOOL=0; fi
          if [ "$REDEN960K" = "true" ]; then REDEN960K_BOOL=1; else REDEN960K_BOOL=0; fi
          if [ "$WINDOWS" = "true" ]; then WINDOWS_BOOL=1; else WINDOWS_BOOL=0; fi
          if [ "$IOS" = "true" ]; then IOS_BOOL=1; else IOS_BOOL=0; fi
          if [ "$STONE" = "true" ]; then STONE_BOOL=1; else STONE_BOOL=0; fi
          if [ "$IFOOD" = "true" ]; then IFOOD_BOOL=1; else IFOOD_BOOL=0; fi
          if [ "$MACOS" = "true" ]; then MACOS_BOOL=1; else MACOS_BOOL=0; fi
          if [ "$LINUX" = "true" ]; then LINUX_BOOL=1; else LINUX_BOOL=0; fi




          # OR lógico
          if [ $((ANDROID_BOOL | TEF_BOOL | PAGSEGURO_BOOL | GETNET_BOOL | CIELO_BOOL | REDE_BOOL | REDEN960K_BOOL | WINDOWS_BOOL | IOS_BOOL | STONE_BOOL | IFOOD_BOOL | MACOS_BOOL | LINUX_BOOL)) -eq 1 ]; then
            COMBINED=true
          else
            COMBINED=false
          fi


          echo "combined=$COMBINED" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v4
        if: ${{ (steps.compute.outputs.combined == 'true') }}
        with:
          repository: cloudfysystems/FLUTTER
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GH_TOKEN }}
          path: flutterrepo

      - uses: actions/checkout@v4
        if: ${{ (steps.compute.outputs.combined == 'true') }}
        with:
          path: version-repo

      - name: Recuperando os commits entre produção e main
        id: log
        if: ${{ (steps.compute.outputs.combined == 'true') }}
        continue-on-error: true
        run: |
          git config --global user.name "cloudfysystems"
          git config --global user.email "cloudfysystem@gmail.com"
          git config --global pull.rebase false
          git pull origin production
          commits=$(git log origin/production..origin/main --pretty=format:"- %s (%an)<br>" --no-merges)
          {
            echo "commit_messages<<EOF"
            echo "$commits"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          git checkout production
          git merge origin/main --no-ff -m "gerando versao na falcatrua" --allow-unrelated-histories
          git push origin production

      - name: Envia e-mail com resumo
        uses: dawidd6/action-send-mail@v3
        if: ${{ (steps.compute.outputs.combined == 'true') }}
        with:
          server_address: mail.cloudfy.net.br
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "Speedy POS - Gerado versão em produção"
          html_body: |
            <p><b>Olá time!</b></p>


            Foi gerada uma nova versão em produção do SpeedyPOS!<br><br>
              
            Commits incluídos:<br><br>
              
            <b>${{ steps.log.outputs.commit_messages }}</b><br><br>
              
            <p>Os novos arquivos estão disponiveis na area de download</p>
              
            <p><b>Menos foco, mais ansiedade!</b></p>
          to: ${{ vars.EMAIL }}
          from: Cloudfy Versão <noreply@cloudfy.net.br>
          secure: true
