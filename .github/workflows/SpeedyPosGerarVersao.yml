      - name: Ajeitar o longpath do git
        if: ${{ inputs.windows-profile }}
        run: |
          git config --system core.longpaths true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        if: ${{ inputs.windows-profile }}
        with:
          flutter-version: ${{vars.FLUTTER_VERSION_SDK_WINDOWS}}
