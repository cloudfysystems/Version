        if: ${{ (steps.compute.outputs.execute == 'true') }}
        run: |
          apktool d build/app/outputs/flutter-apk/app-${{env.DeployName}}-release.apk -o app-decoded -f
      - name: ✏️ Alterar minSdkVersion no apktool.yml
