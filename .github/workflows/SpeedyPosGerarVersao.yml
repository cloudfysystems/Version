          wget https://raw.githubusercontent.com/iBotPeaches/Apktool/main/scripts/linux/apktool

          chmod +x apktool
          sudo mv apktool /usr/local/bin/
          sudo cp apktool_2.9.3.jar /usr/local/bin/apktool.jar

