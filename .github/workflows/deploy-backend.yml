name: Deploy Backend

# Deploy de apps backend Cloudfy (Node 24 + pnpm 10 + monorepo).
# Cada app habilitada via checkbox dispara o reusable workflow
# `_deploy-backend-app.yml` que faz CI -> Build ECR -> Deploy EKS.
#
# Estrutura:
#   - Inputs: environment, tipoDeploy (producao/staging), apps (booleanos), email
#   - Por app habilitada: chama _deploy-backend-app.yml com os parametros corretos
#   - Multiplas apps rodam em paralelo (cada uma um pipeline de 3 jobs)
#   - notify final agrega resultados e manda email
#
# K8s resources de prod e staging coexistem no mesmo cluster — todos os
# nomes ganham suffix `-staging` quando tipoDeploy=staging (Deployment,
# Service, PVC, Secret, etc). ECR image tambem (cloudfysystems/nodejs<APP>-staging).
# GitHub Secret de conf vai pra variante CONF_<APP>_STAGING.
#
# Pra adicionar n01ap01/n02ap01/n04ap01 no futuro:
#   1. Adicionar input boolean ao workflow_dispatch (ex: n01ap01)
#   2. Copiar o bloco "n03ap01:" abaixo, renomear pra "n01ap01:"
#   3. Ajustar app_name e k8s_base (apps novas: k8s_base = app_name; sem v2)
#   4. Adicionar o job ao `needs:` do job notify

on:
    workflow_dispatch:
        inputs:
            environment:
                description: "Ambiente (conta AWS / cluster EKS)"
                type: choice
                required: true
                options:
                    - prodCloudfy
                    - prodAcCredito
                    - homolAcCredito
            tipoDeploy:
                description: "Tipo de deploy (producao=branch main; staging=branch staging + imagem -staging)"
                type: choice
                required: true
                options:
                    - producao
                    - staging
            n03ap01:
                description: "Deploy N03AP01 (Cloudfy Delivery API)"
                type: boolean
                default: true
            force_image_rebuild:
                description: "Forçar rebuild da imagem ECR mesmo sem mudança de deps"
                type: boolean
                default: false
            email:
                description: "Enviar email de notificação ao finalizar?"
                type: boolean
                default: true

permissions:
    id-token: write
    contents: read

jobs:
    n03ap01:
        if: ${{ inputs.n03ap01 }}
        uses: ./.github/workflows/_deploy-backend-app.yml
        with:
            app_name: n03ap01
            k8s_base: n03ap01v2   # legado — n03 mantém v2 nos recursos K8s
            environment: ${{ inputs.environment }}
            tipo_deploy: ${{ inputs.tipoDeploy }}
            force_image_rebuild: ${{ inputs.force_image_rebuild }}
        secrets:
            CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
            # Resolve dinamicamente o secret de conf baseado em tipoDeploy.
            # Cada environment tem 2 secrets: CONF_N03AP01 (prod) + CONF_N03AP01_STAGING.
            CONF_BACKEND: ${{ inputs.tipoDeploy == 'staging' && secrets.CONF_N03AP01_STAGING || secrets.CONF_N03AP01 }}

    # Pra adicionar n01ap01 no futuro, descomentar e ajustar:
    # n01ap01:
    #     if: ${{ inputs.n01ap01 }}
    #     uses: ./.github/workflows/_deploy-backend-app.yml
    #     with:
    #         app_name: n01ap01
    #         k8s_base: n01ap01   # apps novas — sem v2
    #         environment: ${{ inputs.environment }}
    #         tipo_deploy: ${{ inputs.tipoDeploy }}
    #         force_image_rebuild: ${{ inputs.force_image_rebuild }}
    #     secrets:
    #         CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
    #         CONF_BACKEND: ${{ inputs.tipoDeploy == 'staging' && secrets.CONF_N01AP01_STAGING || secrets.CONF_N01AP01 }}

    notify:
        name: "Notificacao por email (sucesso ou falha)"
        needs: [n03ap01]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Calcular resultado
              id: outcome
              run: |
                  set -e
                  APPS=""
                  if [ "${{ inputs.n03ap01 }}" = "true" ]; then APPS="$APPS n03ap01"; fi
                  APPS="${APPS# }"

                  N03_RES="${{ needs.n03ap01.result }}"

                  if echo "${N03_RES}" | grep -qE 'failure|cancelled'; then
                      STATUS=falhou
                      COLOR='#c0392b'
                      SUBJECT="[FALHA] Backend deploy ${{ inputs.tipoDeploy }} em ${{ inputs.environment }}"
                  else
                      STATUS=concluido
                      COLOR='#27ae60'
                      SUBJECT="[OK] Backend deploy ${{ inputs.tipoDeploy }} em ${{ inputs.environment }}"
                  fi

                  echo "status=${STATUS}"      >> "$GITHUB_OUTPUT"
                  echo "color=${COLOR}"        >> "$GITHUB_OUTPUT"
                  echo "subject=${SUBJECT}"    >> "$GITHUB_OUTPUT"
                  echo "apps=${APPS:-nenhuma}" >> "$GITHUB_OUTPUT"
                  echo "n03_res=${N03_RES}"    >> "$GITHUB_OUTPUT"

            - name: Enviar email
              if: ${{ inputs.email }}
              uses: dawidd6/action-send-mail@v3
              with:
                  server_address: mail.cloudfy.net.br
                  server_port: 465
                  username: ${{ secrets.EMAIL_USER }}
                  password: ${{ secrets.EMAIL_PASS }}
                  subject: ${{ steps.outcome.outputs.subject }}
                  html_body: |
                      <h2 style="color: ${{ steps.outcome.outputs.color }}">
                          Backend deploy ${{ steps.outcome.outputs.status }}
                      </h2>
                      <table cellpadding="6" cellspacing="0" border="1" style="border-collapse: collapse; font-family: Arial, sans-serif;">
                          <tr><td><b>Ambiente:</b></td>          <td>${{ inputs.environment }}</td></tr>
                          <tr><td><b>Tipo:</b></td>              <td>${{ inputs.tipoDeploy }}</td></tr>
                          <tr><td><b>Apps deployadas:</b></td>   <td>${{ steps.outcome.outputs.apps }}</td></tr>
                          <tr><td><b>Resultado n03ap01:</b></td> <td>${{ steps.outcome.outputs.n03_res }}</td></tr>
                          <tr><td><b>Disparado por:</b></td>     <td>${{ github.actor }}</td></tr>
                      </table>
                      <p>
                          <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                              Ver logs do workflow
                          </a>
                      </p>
                  to: ${{ vars.EMAIL }}
                  from: Cloudfy Deploy <noreply@cloudfy.net.br>
                  secure: true
