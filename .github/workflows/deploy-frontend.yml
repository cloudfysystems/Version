name: Deploy Frontend

# Deploy de apps frontend Cloudfy (Angular 21 + pnpm 10).
# Cada app habilitada via checkbox dispara o reusable workflow
# `_deploy-frontend-app.yml` que faz clone + build + rsync pro PVC EFS.
#
# Estrutura:
#   - Inputs: environment, tipoDeploy (producao/staging), apps (booleanos), email
#   - Multiplas apps rodam em paralelo
#   - notify final agrega resultados e manda email
#
# K8s nao tem Deployment dedicado (frontend e static files servidos pelo nginx
# via PVC frontendpvc). Soh o path no PVC muda entre prod/staging:
#   prod:    /pvc/A03AP01/
#   staging: /pvc/A03AP01-staging/
#
# Pra adicionar a04ap01/etc no futuro:
#   1. Adicionar input boolean (ex: a04ap01)
#   2. Copiar o bloco "a03ap01:" abaixo, ajustar app_lower/app_upper
#   3. Adicionar ao `needs:` do notify

on:
    workflow_dispatch:
        inputs:
            environment:
                description: "Ambiente (conta AWS / cluster EKS)"
                type: choice
                required: true
                options:
                    - prodCloudfy
                    - prodAcCredito
                    - homolAcCredito
            tipoDeploy:
                description: "Tipo de deploy (producao=branch main; staging=branch staging + path -staging no PVC)"
                type: choice
                required: true
                options:
                    - producao
                    - staging
            a03ap01:
                description: "Deploy A03AP01 (Cloudfy Delivery Web)"
                type: boolean
                default: true
            email:
                description: "Enviar email de notificação ao finalizar?"
                type: boolean
                default: true

permissions:
    id-token: write
    contents: read

jobs:
    a03ap01:
        if: ${{ inputs.a03ap01 }}
        uses: ./.github/workflows/_deploy-frontend-app.yml
        with:
            app_lower: a03ap01
            app_upper: A03AP01
            environment: ${{ inputs.environment }}
            tipo_deploy: ${{ inputs.tipoDeploy }}
        secrets:
            CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
            # CONF_FRONTEND e opcional. Resolve dinamicamente: prod usa CONF_A03AP01,
            # staging usa CONF_A03AP01_STAGING. Se a var nao existir no environment,
            # CONF_FRONTEND fica vazio e o build usa Prod.ts default do repo.
            CONF_FRONTEND: ${{ inputs.tipoDeploy == 'staging' && vars.CONF_A03AP01_STAGING || vars.CONF_A03AP01 }}

    notify:
        name: "Notificacao por email (sucesso ou falha)"
        needs: [a03ap01]
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: Calcular resultado
              id: outcome
              run: |
                  set -e
                  APPS=""
                  if [ "${{ inputs.a03ap01 }}" = "true" ]; then APPS="$APPS a03ap01"; fi
                  APPS="${APPS# }"

                  A03_RES="${{ needs.a03ap01.result }}"

                  if echo "${A03_RES}" | grep -qE 'failure|cancelled'; then
                      STATUS=falhou
                      COLOR='#c0392b'
                      SUBJECT="[FALHA] Frontend deploy ${{ inputs.tipoDeploy }} em ${{ inputs.environment }}"
                  else
                      STATUS=concluido
                      COLOR='#27ae60'
                      SUBJECT="[OK] Frontend deploy ${{ inputs.tipoDeploy }} em ${{ inputs.environment }}"
                  fi

                  echo "status=${STATUS}"      >> "$GITHUB_OUTPUT"
                  echo "color=${COLOR}"        >> "$GITHUB_OUTPUT"
                  echo "subject=${SUBJECT}"    >> "$GITHUB_OUTPUT"
                  echo "apps=${APPS:-nenhuma}" >> "$GITHUB_OUTPUT"
                  echo "a03_res=${A03_RES}"    >> "$GITHUB_OUTPUT"

            - name: Enviar email
              if: ${{ inputs.email }}
              uses: dawidd6/action-send-mail@v3
              with:
                  server_address: mail.cloudfy.net.br
                  server_port: 465
                  username: ${{ secrets.EMAIL_USER }}
                  password: ${{ secrets.EMAIL_PASS }}
                  subject: ${{ steps.outcome.outputs.subject }}
                  html_body: |
                      <h2 style="color: ${{ steps.outcome.outputs.color }}">
                          Frontend deploy ${{ steps.outcome.outputs.status }}
                      </h2>
                      <table cellpadding="6" cellspacing="0" border="1" style="border-collapse: collapse; font-family: Arial, sans-serif;">
                          <tr><td><b>Ambiente:</b></td>          <td>${{ inputs.environment }}</td></tr>
                          <tr><td><b>Tipo:</b></td>              <td>${{ inputs.tipoDeploy }}</td></tr>
                          <tr><td><b>Apps deployadas:</b></td>   <td>${{ steps.outcome.outputs.apps }}</td></tr>
                          <tr><td><b>Resultado a03ap01:</b></td> <td>${{ steps.outcome.outputs.a03_res }}</td></tr>
                          <tr><td><b>Disparado por:</b></td>     <td>${{ github.actor }}</td></tr>
                      </table>
                      <p>
                          <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                              Ver logs do workflow
                          </a>
                      </p>
                  to: ${{ vars.EMAIL }}
                  from: Cloudfy Deploy <noreply@cloudfy.net.br>
                  secure: true
