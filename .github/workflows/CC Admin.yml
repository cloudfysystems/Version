      # Setup Shorebird
      - name: 🐦 Setup Shorebird
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Gerar Patch iOS
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        uses: shorebirdtech/shorebird-patch@v1
        id: shorebird-patch
        with:
          platform: ios
          args: --allow-asset-diffs --target=lib/main_prod.dart --export-options-plist ios/GHAExportOptions.plist
          release-version: ${{ env.VERSAOOLD }}
          flutter-version: ${{ vars.FLUTTER_VERSION_SDK_ANDROID_SMART }}
          working-directory: ./flutter/adm

      - name: Atualizar branch com merge (se necessário)
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        working-directory: version-repo
        run: |
          git config user.name "cloudfysystems"
          git config user.email "cloudfysystems@gmail.com"

          # Garante que estamos na branch correta
          git branch --show-current

          # Tenta fazer pull e merge automático
          git pull origin HEAD --no-rebase || true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit das alterações
        uses: EndBug/add-and-commit@v9
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        with:
          author_name: cloudfysystems
          author_email: cloudfysystems@gmail.com
          message: "patch shorebird ${{env.DeployNameUpperCase}}"
          cwd: ./version-repo
          add: "version${{env.DeployNameUpperCase}}.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
  #Job que vai atualizar o git, sincronizar os fontes
  FinishJob:
    needs: [android, ios, android-patch, ios-patch]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./flutterrepo

    steps:
      - name: Calculando a combinação dos booleans Android
        id: compute
        working-directory: .
        run: |
          ANDROID=${{ github.event.inputs.android }}
          IOS=${{ github.event.inputs.ios }}
          ANDROID_PATCH=${{ github.event.inputs.android-patch }}
          IOS_PATCH=${{ github.event.inputs.ios-patch }}



          # Converte string para 0/1
          if [ "$ANDROID" = "true" ]; then ANDROID_BOOL=1; else ANDROID_BOOL=0; fi
          if [ "$IOS" = "true" ]; then IOS_BOOL=1; else IOS_BOOL=0; fi
          if [ "$ANDROID_PATCH" = "true" ]; then ANDROID_PATCH_BOOL=1; else ANDROID_PATCH_BOOL=0; fi
          if [ "$IOS_PATCH" = "true" ]; then IOS_PATCH_BOOL=1; else IOS_PATCH_BOOL=0; fi


          # OR lógico
          if [ $((ANDROID_BOOL | IOS_BOOL | ANDROID_PATCH_BOOL | IOS_PATCH_BOOL)) -eq 1 ]; then
            COMBINED=true
          else
            COMBINED=false
          fi

          echo "combined=$COMBINED" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v4
        if: ${{ (steps.compute.outputs.combined == 'true') }}
        with:
          repository: cloudfysystems/FLUTTER
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GH_TOKEN }}
          path: flutterrepo

      - uses: actions/checkout@v4
        if: ${{ (steps.compute.outputs.combined == 'true') }}
        with:
          path: version-repo

      - name: Recuperando os commits entre produção e main
        id: log
        if: ${{ (steps.compute.outputs.combined == 'true') }}
        continue-on-error: true
        run: |
          git config --global user.name "cloudfysystems"
          git config --global user.email "cloudfysystem@gmail.com"
          git config --global pull.rebase false
          git pull origin production
          commits=$(git log origin/production..origin/main --pretty=format:"- %s (%an)<br>" --no-merges)
          {
            echo "commit_messages<<EOF"
            echo "$commits"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          git checkout production
          git merge origin/main --no-ff -m "gerando versao na falcatrua" --allow-unrelated-histories
          git push origin production

      - name: Envia e-mail com resumo
        uses: dawidd6/action-send-mail@v3
        #if: ${{ steps.compute.outputs.combined == 'true' && github.event.inputs.email}}
        if: false
        with:
          server_address: mail.cloudfy.net.br
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "CC Admin - Gerado versão em produção"
          html_body: |
            <p><b>Olá time!</b></p>


            Foi gerada uma nova versão em produção do CCAdmin!<br><br>
              
            Commits incluídos:<br><br>
              
            <b>${{ steps.log.outputs.commit_messages }}</b><br><br>
              
            <p>Os novos arquivos estão disponíveis na área de download</p>
              
            <p><b>Menos foco, mais ansiedade!</b></p>
          to: ${{ vars.EMAIL }}
          from: Cloudfy Versão <noreply@cloudfy.net.br>
          secure: true
