name: CCAdmin Gerar versão

on:
  workflow_dispatch: # Roda apenas manualmente pelo painel do GitHub
    inputs:
      #version:
      #  description: 'Versão do build'
      #  required: true
      #  default: '1.0.0'
      android:
        description: "Gerar versão Android?"
        default: true
        type: boolean
      ios:
        description: "Gerar versão iOS?"
        default: true
        type: boolean
      android-patch:
        description: "Gerar Patch (Shorebird) Android?"
        default: false
        type: boolean
      ios-patch:
        description: "Gerar Patch (Shorebird) iOS?"
        default: false
        type: boolean
      email:
        description: "Deseja enviar email ao finalizar?"
        default: false
        type: boolean

env:
  VERSION: ${{vars.VERSAO}}
  BUILD: ${{vars.build}}
  SENHA_CERTIFICADO_CLOUDFY: ${{ secrets.SENHA_CERTIFICADO_CLOUDFY }}
  SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_KEY }}
  SIGNATURE_APP_ID: ${{ secrets.SIGNATURE_APP_ID }}
  SIGNATURE_CERTIFICATE_NAME: ${{ secrets.SIGNATURE_CERTIFICATE_NAME }}
  SIGNATURE_VAULT_ID: ${{ secrets.SIGNATURE_VAULT_ID }}
  SIGNATURE_PASSWORD: ${{ secrets.SIGNATURE_PASSWORD }}
  SIGNATURE_TENANT_ID: ${{ secrets.SIGNATURE_TENANT_ID }}

jobs:
  android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./flutter/adm

    steps:
      - name: Gerar Variáveis de Ambiente
        working-directory: .
        id: compute
        run: |
          echo 'DeployName=prod' >> $GITHUB_ENV
          echo 'DeployNameUpperCase=AdmAndroid' >> $GITHUB_ENV
          echo 'UrlId=18' >> $GITHUB_ENV
          VARIABLE=${{ github.event.inputs.android }}

          # Converte string para 0/1
          if [ "$VARIABLE" = "true" ]; then VARIABLE_BOOL=1; else VARIABLE_BOOL=0; fi          


          # OR lógico
          if [ $((VARIABLE_BOOL)) -eq 1 ]; then
            EXECUTE=true
          else
            EXECUTE=false
          fi

          echo "Valor do execute: $EXECUTE"

          echo "execute=$EXECUTE" >> $GITHUB_OUTPUT
      # Clonar o repositório principal do Flutter
      - uses: actions/checkout@v4
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        with:
          repository: cloudfysystems/FLUTTER
          ref: main
          token: ${{ secrets.GH_TOKEN }}
          path: flutter

      # Clonar o repositório de versão
      - uses: actions/checkout@v4
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        with:
          path: version-repo

      # Ler e atualizar a versão
      - name: Ler versão atual
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        working-directory: version-repo
        shell: bash
        run: |
          VERSION_FILE="version${{env.DeployNameUpperCase}}.json"

          # Atualiza o JSON corretamente
          jq '.speedy.build += 1 | .speedy.version += 1 | .speedy.patch = 0' "$VERSION_FILE" > tmp.json

          mv tmp.json "$VERSION_FILE"

          # Pega os valores após a atualização
          BUILD=$(jq -r '.speedy.build' "$VERSION_FILE")
          VERSION=$(jq -r '.speedy.version' "$VERSION_FILE")
          SIMPLE=$(jq -r '.speedy.simple' "$VERSION_FILE")

          echo "Versao Build: $BUILD"
          echo "Versao Version: $VERSION"
          echo "Versao Gerada: $SIMPLE.$VERSION.0"

          echo "VERSAO=$SIMPLE.$VERSION.0" >> $GITHUB_ENV
          echo "VERSAO_BUILD=$BUILD" >> $GITHUB_ENV

          echo "Novo JSON:"
          cat "$VERSION_FILE"

      # Criar arquivo .jks a partir de base64
      - name: Criar arquivo .jks
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        shell: bash
        run: |
          mkdir -p certificado
          echo "${{ secrets.KEYSTORE_ADM }}" | base64 -d > certificado/certificado-keystore.keystore

      # Setup Shorebird
      - name: 🐦 Setup Shorebird
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      # Criar arquivo key.properties
      - name: Criar arquivo key.properties
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        shell: bash
        run: |
          echo "storePassword=${{ secrets.SENHA_KEYSTORE }}" > android/key.properties
          echo "keyPassword=${{ secrets.SENHA_KEYSTORE }}" >> android/key.properties
          echo "keyAlias=cloudcommerce" >> android/key.properties
          echo "storeFile=../../certificado/certificado-keystore.keystore" >> android/key.properties

      # Set Up Java (usando Oracle JDK 17)
      - name: Set Up Java
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        uses: actions/setup-java@v3
        with:
          distribution: "oracle"
          java-version: "17"

      # Atualizar versão no arquivo Dart
      - name: Atualiza versão no pubspec.yaml
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        shell: bash
        run: |
          sed -i "s/^version:.*/version: $VERSAO+${{ env.VERSAO_BUILD }}/" pubspec.yaml
          cat pubspec.yaml

      # Executar build do Shorebird
      - name: 🚀 Shorebird Release
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        id: shorebird-release
        uses: shorebirdtech/shorebird-release@v1
        with:
          args: --target lib/main_prod.dart --artifact apk
          platform: android
          flutter-version: ${{vars.FLUTTER_VERSION_SDK_ANDROID_SMART}}
          working-directory: ./flutter/adm

      - name: Renomear arquivos Android
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        working-directory: .
        run: |
          echo "Renomeando APK"
          if [ -f "flutter/adm/build/app/outputs/flutter-apk/app-release.apk" ]; then
            mv flutter/adm/build/app/outputs/flutter-apk/app-release.apk flutter/adm/build/app/outputs/flutter-apk/CloudfyAdmAndroid.apk
            echo "APK renomeado para CloudfyAdmAndroid.apk"
          else
            echo "⚠️ APK não encontrado!"
          fi

          echo "Renomeando AAB"
          if [ -f "flutter/adm/build/app/outputs/bundle/release/app-release.aab" ]; then
            mv flutter/adm/build/app/outputs/bundle/release/app-release.aab flutter/adm/build/app/outputs/bundle/release/CloudfyAdmAndroid.aab
            echo "AAB renomeado para CloudfyAdmAndroid.aab"
          else
            echo "⚠️ AAB não encontrado!"
          fi

      - name: Criando o release
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSAO }}_Adm${{env.DeployNameUpperCase}}
          name: v${{ env.VERSAO }}_Adm${{env.DeployNameUpperCase}}
          files: |
            flutter/adm/build/app/outputs/flutter-apk/CloudfyAdmAndroid.apk
            flutter/adm/build/app/outputs/bundle/release/CloudfyAdmAndroid.aab
          body: Release gerado automaticamente.
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Chamar API de alteração de dados android
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        run: |
          URLANDROID="https://github.com/cloudfysystems/Version/releases/download/v${{ env.VERSAO }}_Adm${{env.DeployNameUpperCase}}/CloudfyAdmAndroid.apk"
          echo "$URLANDROID"
          echo "Chamando API de validação..."

          JSON_DATA=$(cat <<EOF
          {
            "JSON": true,
            "Parameters": {
              "Versao": "${{ env.VERSAO }}",
              "PSW": "${{ secrets.SENHA_API_ALTERAR_URL }}",
              "URL": "$URLANDROID",
              "NR_ID": ${{ env.UrlId }}
            }
          }
          EOF
          )

          echo $JSON_DATA

          response=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST https://api.cloudfy.net.br/H02SF0107A \
            -H "Content-Type: application/json" \
            -d "$JSON_DATA")

          echo "Código HTTP: $response"
          cat response.txt

          if [ "$response" != "200" ]; then
            echo "❌ Falha na chamada da API. Abortando workflow."
            exit 1
          fi

      - name: Atualizar branch com merge (se necessário)
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        working-directory: version-repo
        run: |
          git config user.name "cloudfysystems"
          git config user.email "cloudfysystems@gmail.com"

          # Garante que estamos na branch correta
          git branch --show-current

          # Tenta fazer pull e merge automático
          git pull origin HEAD --no-rebase || true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit das alterações
        uses: EndBug/add-and-commit@v9
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        with:
          author_name: cloudfysystems
          author_email: cloudfysystems@gmail.com
          message: "alterada versão do build ${{env.DeployNameUpperCase}}"
          cwd: ./version-repo
          add: "version${{env.DeployNameUpperCase}}.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
  ios:
    runs-on: macos-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./flutter/adm

    steps:
      # Clonar o repositório principal do Flutter
      - uses: actions/checkout@v4
        if: ${{ inputs.ios}}
        with:
          repository: cloudfysystems/FLUTTER
          ref: main
          token: ${{ secrets.GH_TOKEN }}
          path: flutter

      # Clonar o repositório de versão
      - uses: actions/checkout@v4
        if: ${{ inputs.ios}}
        with:
          path: version-repo

      # Ler e atualizar a versão
      - name: Ler versão atual
        if: ${{ inputs.ios}}
        working-directory: version-repo
        shell: bash
        run: |
          VERSION_FILE="versionAdmIos.json"

          # Atualiza o JSON corretamente
          jq '.speedy.build += 1 | .speedy.version += 1 | .speedy.patch = 0' "$VERSION_FILE" > tmp.json

          mv tmp.json "$VERSION_FILE"

          # Pega os valores após a atualização
          BUILD=$(jq -r '.speedy.build' "$VERSION_FILE")
          VERSION=$(jq -r '.speedy.version' "$VERSION_FILE")
          SIMPLE=$(jq -r '.speedy.simple' "$VERSION_FILE")

          echo "Versao Build: $BUILD"
          echo "Versao Version: $VERSION"
          echo "Versao Gerada: $SIMPLE.$VERSION.0"

          echo "VERSAO=$SIMPLE.$VERSION.0" >> $GITHUB_ENV
          echo "VERSAO_BUILD=$BUILD" >> $GITHUB_ENV

          echo "Novo JSON:"
          cat "$VERSION_FILE"

      - name: Import code sign
        if: ${{ inputs.ios}}
        uses: Apple-Actions/import-codesign-certs@v1
        with:
          p12-file-base64: ${{ secrets.APPLE_CERT_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERT_PSW }}

      - name: Download provisioning
        if: ${{ inputs.ios}}
        uses: Apple-Actions/download-provisioning-profiles@v1
        with:
          bundle-id: com.cloudfy.mobile.cc.admin
          issuer-id: ${{ secrets.APPLE_API_ISSUER_ID }}
          api-key-id: ${{ secrets.APPLE_API_KEY }}
          api-private-key: ${{ secrets.APPLE_API_PRIVATE_KEY }}
      - name: Configure Auth Key
        if: ${{ inputs.ios}}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPLE_API_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{vars.FLUTTER_VERSION_SDK_ANDROID_SMART}}
          channel: "stable"
          cache: true
      - name: Install CocoaPods dependencies
        if: ${{ inputs.ios}}
        run: |
          flutter pub get
          cd ios
          pod install --repo-update

      # Atualizar versão no arquivo Dart
      - name: Atualiza versão do pubspec.yaml
        if: ${{ inputs.ios }}
        shell: bash
        run: |
          # Atualiza pubspec.yaml
          sed -i '' "s/^version:.*/version: $VERSAO+${{ env.VERSAO_BUILD }}/" pubspec.yaml
          cat pubspec.yaml

      # Setup Shorebird
      - name: 🐦 Setup Shorebird
        if: ${{ inputs.ios}}
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      # Executar build do Shorebird
      - name: 🚀 Shorebird Release
        if: ${{ inputs.ios}}
        id: shorebird-release
        uses: shorebirdtech/shorebird-release@v1
        with:
          args: --target=lib/main_prod.dart --export-options-plist ios/GHAExportOptions.plist
          platform: ios
          flutter-version: ${{vars.FLUTTER_VERSION_SDK_ANDROID_SMART}}
          working-directory: ./flutter/adm

      - name: Atualizar branch com merge (se necessário)
        if: ${{ inputs.ios}}
        working-directory: version-repo
        run: |
          git config user.name "cloudfysystems"
          git config user.email "cloudfysystems@gmail.com"

          # Garante que estamos na branch correta
          git branch --show-current

          # Tenta fazer pull e merge automático
          git pull origin HEAD --no-rebase || true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit das alterações
        uses: EndBug/add-and-commit@v9
        if: ${{ inputs.ios}}
        with:
          author_name: cloudfysystems
          author_email: cloudfysystems@gmail.com
          message: "alterada versão do build IOS"
          cwd: ./version-repo
          add: "versionAdmIos.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload IPA to App Store Connect
        if: ${{ inputs.ios}}
        run: xcrun altool --upload-app --type ios -f ./build/ios/ipa/*.ipa --apiKey ${{ secrets.APPLE_API_KEY }} --apiIssuer ${{ secrets.APPLE_API_ISSUER_ID }}
  android-patch:
    runs-on: ubuntu-latest
    needs: android
    if: ${{ always() && (needs.android.result == 'success' || needs.android.result == 'skipped') }}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./flutter/adm

    steps:
      - name: Gerar Variáveis de Ambiente
        working-directory: .
        id: compute
        run: |
          echo 'DeployName=prod' >> $GITHUB_ENV
