          echo "${{ secrets.KEYSTORE_ADM }}" | base64 -d > certificado/certificado-keystore.keystore

      # Setup Shorebird
      - name: 🐦 Setup Shorebird
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      # Criar arquivo key.properties
      - name: Criar arquivo key.properties
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        shell: bash
        run: |
          echo "storePassword=${{ secrets.SENHA_KEYSTORE }}" > android/key.properties
          echo "keyPassword=${{ secrets.SENHA_KEYSTORE }}" >> android/key.properties
          echo "keyAlias=cloudcommerce" >> android/key.properties
          echo "storeFile=../../certificado/certificado-keystore.keystore" >> android/key.properties

      # Set Up Java (usando Oracle JDK 17)
      - name: Set Up Java
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        uses: actions/setup-java@v3
        with:
          distribution: "oracle"
          java-version: "17"

      # NÃO atualizar pubspec.yaml — Shorebird identifica a release pela versão do pubspec;
      # alterar invalidaria o patch contra a release-version alvo.

      - name: Gerar Patch Android
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        uses: shorebirdtech/shorebird-patch@v1
        id: shorebird-patch
        with:
          platform: android
          args: --allow-asset-diffs --target lib/main_prod.dart
          release-version: ${{ env.VERSAOOLD }}
          flutter-version: ${{ vars.FLUTTER_VERSION_SDK_ANDROID_SMART }}
          working-directory: ./flutter/adm

      - name: Chamar API de alteração de dados android
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        run: |
          echo "Chamando API de validação..."

          JSON_DATA=$(cat <<EOF
          {
            "JSON": true,
            "Parameters": {
              "Versao": "${{ env.VERSAO }}",
              "PSW": "${{ secrets.SENHA_API_ALTERAR_URL }}",
              "NR_ID": ${{ env.UrlId }}
            }
          }
          EOF
          )

          echo $JSON_DATA

          response=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST https://api.cloudfy.net.br/H02SF0107A \
            -H "Content-Type: application/json" \
            -d "$JSON_DATA")

          echo "Código HTTP: $response"
          cat response.txt

          if [ "$response" != "200" ]; then
            echo "❌ Falha na chamada da API. Abortando workflow."
            exit 1
          fi

      - name: Atualizar branch com merge (se necessário)
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        working-directory: version-repo
        run: |
          git config user.name "cloudfysystems"
          git config user.email "cloudfysystems@gmail.com"

          # Garante que estamos na branch correta
          git branch --show-current

          # Tenta fazer pull e merge automático
          git pull origin HEAD --no-rebase || true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit das alterações
        uses: EndBug/add-and-commit@v9
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        with:
          author_name: cloudfysystems
          author_email: cloudfysystems@gmail.com
          message: "patch shorebird ${{env.DeployNameUpperCase}}"
          cwd: ./version-repo
          add: "version${{env.DeployNameUpperCase}}.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
  ios-patch:
    runs-on: macos-latest
    needs: ios
    if: ${{ always() && (needs.ios.result == 'success' || needs.ios.result == 'skipped') }}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./flutter/adm

    steps:
      - name: Gerar Variáveis de Ambiente
        working-directory: .
        id: compute
        run: |
          echo 'DeployName=ios' >> $GITHUB_ENV
          echo 'DeployNameUpperCase=AdmIos' >> $GITHUB_ENV
          VARIABLE=${{ github.event.inputs.ios-patch }}

          # Converte string para 0/1
          if [ "$VARIABLE" = "true" ]; then VARIABLE_BOOL=1; else VARIABLE_BOOL=0; fi


          # OR lógico
          if [ $((VARIABLE_BOOL)) -eq 1 ]; then
            EXECUTE=true
