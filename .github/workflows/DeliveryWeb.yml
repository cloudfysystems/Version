name: Delivery Web - Gerar versão

on:
  workflow_dispatch: # Roda apenas manualmente pelo painel do GitHub
    inputs:
      web:
        description: "Gerar versão Web?"
        default: true
        type: boolean
      email:
        description: "Deseja enviar email ao finalizar?"
        default: true
        type: boolean

env:
  SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_KEY }}

jobs:
  web:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./flutter/delivery

    steps:
      - name: Gerar Variáveis de Ambiente
        working-directory: .
        id: compute
        run: |
          echo 'DeployName=prod' >> $GITHUB_ENV
          echo 'DeployNameUpperCase=DeliveryWeb' >> $GITHUB_ENV
          VARIABLE=${{ github.event.inputs.web }}

          # Converte string para 0/1
          if [ "$VARIABLE" = "true" ]; then VARIABLE_BOOL=1; else VARIABLE_BOOL=0; fi

          # OR lógico
          if [ $((VARIABLE_BOOL)) -eq 1 ]; then
            EXECUTE=true
          else
            EXECUTE=false
          fi

          echo "Valor do execute: $EXECUTE"

          echo "execute=$EXECUTE" >> $GITHUB_OUTPUT

      # Clonar o repositório principal do Flutter
      - uses: actions/checkout@v4
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        with:
          repository: cloudfysystems/FLUTTER
          ref: main
          token: ${{ secrets.GH_TOKEN }}
          path: flutter

      # Clonar o repositório de versão
      - uses: actions/checkout@v4
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        with:
          path: version-repo

      # Ler e atualizar a versão
      - name: Ler versão atual
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        working-directory: version-repo
        shell: bash
        run: |
          VERSION_FILE="version${{env.DeployNameUpperCase}}.json"

          # Atualiza o JSON corretamente
          jq '.speedy.build += 1 | .speedy.version += 1 | .speedy.patch = 0' "$VERSION_FILE" > tmp.json

          mv tmp.json "$VERSION_FILE"

          # Pega os valores após a atualização
          BUILD=$(jq -r '.speedy.build' "$VERSION_FILE")
          VERSION=$(jq -r '.speedy.version' "$VERSION_FILE")
          SIMPLE=$(jq -r '.speedy.simple' "$VERSION_FILE")

          echo "Versao Build: $BUILD"
          echo "Versao Version: $VERSION"
          echo "Versao Gerada: $SIMPLE.$VERSION.0"

          echo "VERSAO=$SIMPLE.$VERSION.0" >> $GITHUB_ENV
          echo "VERSAO_BUILD=$BUILD" >> $GITHUB_ENV

          echo "Novo JSON:"
          cat "$VERSION_FILE"

      # Setup Flutter
      - name: Setup Flutter
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{vars.FLUTTER_VERSION_SDK_DELIVERY}}
          channel: stable
          cache: true

      # Atualizar versão no arquivo Dart
      - name: Atualiza versão no pubspec.yaml
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        shell: bash
        run: |
          sed -i "s/^version:.*/version: $VERSAO+${{ env.VERSAO_BUILD }}/" pubspec.yaml
          cat pubspec.yaml

      - name: Atualiza version.dart
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        shell: bash
        run: |
          echo "const String appVersion = '$VERSAO';" > lib/Environment/Version.dart

      # Instalar dependencias
      - name: Flutter pub get
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        run: flutter pub get

      # Gerar env/prod.json a partir dos secrets
      - name: Gerar env/prod.json
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        run: |
          mkdir -p env
          echo '${{ secrets.ENV_PROD_DELIVERY }}' > ./env/prod.json

      # Build Web
      - name: Build Flutter Web
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        run: flutter build web --wasm --release --dart-define-from-file env/prod.json

      # Zipar o build web
      - name: Zipar build web
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        working-directory: ./flutter/delivery/build/web
        run: |
          zip -r ../../../../CloudfyDeliveryWeb.zip .
          echo "ZIP criado com sucesso"
          ls -la ../../../../CloudfyDeliveryWeb.zip

      # Criar release no GitHub
      - name: Criando o release
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSAO }}_delivery${{env.DeployNameUpperCase}}
          name: v${{ env.VERSAO }}_delivery${{env.DeployNameUpperCase}}
          files: |
            CloudfyDeliveryWeb.zip
          body: Release gerado automaticamente - Delivery Web.
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      # Chamar API de deploy no servidor
      - name: Deploy no servidor via API
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        run: |
          URLZIP="https://github.com/cloudfysystems/Version/releases/download/v${{ env.VERSAO }}_delivery${{env.DeployNameUpperCase}}/CloudfyDeliveryWeb.zip"
          echo "URL do ZIP: $URLZIP"
          echo "Chamando API de deploy..."

          JSON_DATA='{"JSON":true,"Parameters":{"Senha":"${{ secrets.SENHA_DEPLOY_DELIVERY }}","Url":"'"$URLZIP"'"}}'

          echo "Payload: $JSON_DATA"

          response=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST https://api.cloudfy.net.br/DeployDelivery \
            -H "Content-Type: application/json" \
            -d "$JSON_DATA" \
            --max-time 120)

          echo "Codigo HTTP: $response"
          cat response.txt

          if [ "$response" != "200" ]; then
            echo "Falha no deploy. Codigo HTTP: $response"
            exit 1
          fi

          echo "Deploy realizado com sucesso!"

      # Deletar o release do GitHub (nao manter fontes desnecessarios)
      - name: Deletar release do GitHub
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        continue-on-error: true
        run: |
          TAG="v${{ env.VERSAO }}_delivery${{env.DeployNameUpperCase}}"
          REPO="cloudfysystems/Version"
          echo "Deletando release e tag: $TAG no repo $REPO"

          # Deleta o release
          gh release delete "$TAG" --yes --cleanup-tag --repo "$REPO" || echo "Release nao encontrado, ignorando..."

          # Garante que a tag tambem foi removida
          git push --delete origin "$TAG" 2>/dev/null || echo "Tag ja removida ou nao encontrada"

          echo "Limpeza concluida!"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # Atualizar branch com merge
      - name: Atualizar branch com merge (se necessário)
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        working-directory: version-repo
        run: |
          git config user.name "cloudfysystems"
          git config user.email "cloudfysystems@gmail.com"

          # Garante que estamos na branch correta
          git branch --show-current

          # Tenta fazer pull e merge automático
          git pull origin HEAD --no-rebase || true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      # Commit da versão
      - name: Commit das alterações
        uses: EndBug/add-and-commit@v9
        if: ${{ (steps.compute.outputs.execute == 'true') }}
        with:
          author_name: cloudfysystems
          author_email: cloudfysystems@gmail.com
          message: "alterada versão do build ${{env.DeployNameUpperCase}}"
          cwd: ./version-repo
          add: "version${{env.DeployNameUpperCase}}.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

  # Job de finalização: merge production + email
  FinishJob:
    needs: [web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./flutterrepo

    steps:
      - name: Calculando execução
        id: compute
        working-directory: .
        run: |
          WEB=${{ github.event.inputs.web }}

          if [ "$WEB" = "true" ]; then WEB_BOOL=1; else WEB_BOOL=0; fi

          if [ $((WEB_BOOL)) -eq 1 ]; then
            COMBINED=true
          else
            COMBINED=false
          fi

          echo "combined=$COMBINED" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        if: ${{ (steps.compute.outputs.combined == 'true') }}
        with:
          repository: cloudfysystems/FLUTTER
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GH_TOKEN }}
          path: flutterrepo

      - uses: actions/checkout@v4
        if: ${{ (steps.compute.outputs.combined == 'true') }}
        with:
          path: version-repo

      - name: Recuperando os commits entre produção e main
        id: log
        if: ${{ (steps.compute.outputs.combined == 'true') }}
        continue-on-error: true
        run: |
          git config --global user.name "cloudfysystems"
          git config --global user.email "cloudfysystem@gmail.com"
          git config --global pull.rebase false
          git pull origin production
          commits=$(git log origin/production..origin/main --pretty=format:"- %s (%an)<br>" --no-merges)
          {
            echo "commit_messages<<EOF"
            echo "$commits"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          git checkout production
          git merge origin/main --no-ff -m "gerando versao na falcatrua" --allow-unrelated-histories
          git push origin production

      - name: Ler versão para email
        if: ${{ (steps.compute.outputs.combined == 'true') }}
        working-directory: version-repo
        run: |
          VERSION_FILE="versionDeliveryWeb.json"
          VERSION=$(jq -r '.speedy.version' "$VERSION_FILE")
          SIMPLE=$(jq -r '.speedy.simple' "$VERSION_FILE")
          echo "VERSAO=$SIMPLE.$VERSION.0" >> $GITHUB_ENV

      - name: Envia e-mail com resumo
        uses: dawidd6/action-send-mail@v3
        if: ${{ steps.compute.outputs.combined == 'true' && github.event.inputs.email == 'true' }}
        with:
          server_address: mail.cloudfy.net.br
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "Delivery Web - Gerado versão em produção"
          html_body: |
            <p><b>Olá time!</b></p>

            Foi gerada uma nova versão em produção do Delivery Web, na versão ${{env.VERSAO}}!<br><br>

            O deploy foi realizado automaticamente no servidor.<br><br>

            Commits incluídos:<br><br>

            <b>${{ steps.log.outputs.commit_messages }}</b><br><br>

            <p><b>Menos foco, mais ansiedade!</b></p>
          to: ${{ vars.EMAIL }}
          from: Cloudfy Versão <noreply@cloudfy.net.br>
          secure: true
