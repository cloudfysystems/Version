name: ONE-SHOT - Export secrets para FLUTTER

# Workflow descartável: copia os 33 secrets do repo Version para os
# environments staging + production do repo cloudfysystems/FLUTTER.
#
# Como funciona:
#   1. O runner monta cada secret em env var (GitHub mascara automaticamente)
#   2. Para cada secret, chama `gh secret set` no FLUTTER usando o PAT
#      configurado em PAT_FLUTTER_WRITE
#   3. Suporta dry-run pra confirmar a lista antes de tocar de verdade
#
# Pré-requisito:
#   - Secret PAT_FLUTTER_WRITE configurado neste repo (Version)
#   - PAT fine-grained com escopo:
#       Repository access: Only cloudfysystems/FLUTTER
#       Permissions: Secrets (read/write) + Environments (read/write)
#
# Apos uso: DELETAR este workflow E o secret PAT_FLUTTER_WRITE.

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Environment alvo no FLUTTER'
        type: choice
        options:
          - both
          - staging
          - production
        default: both
      dry_run:
        description: 'Dry-run? (só lista o que seria feito, sem alterar)'
        type: boolean
        default: true

jobs:
  export:
    name: Copiar secrets para FLUTTER (${{ inputs.target_env }}, dry-run=${{ inputs.dry_run }})
    runs-on: ubuntu-latest
    steps:
      - name: Validar PAT
        env:
          GH_TOKEN: ${{ secrets.PAT_FLUTTER_WRITE }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Secret PAT_FLUTTER_WRITE não configurado neste repo"
            exit 1
          fi
          echo "Testando acesso ao repo FLUTTER..."
          gh api repos/cloudfysystems/FLUTTER --jq .full_name
          echo "Listando environments do FLUTTER..."
          gh api repos/cloudfysystems/FLUTTER/environments --jq '.environments[].name'

      - name: Copiar secrets
        env:
          GH_TOKEN: ${{ secrets.PAT_FLUTTER_WRITE }}
          # === SECRETS A COPIAR (33 itens) ===
          S_APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          S_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          S_APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          S_APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          S_APPLE_CERT_PSW: ${{ secrets.APPLE_CERT_PSW }}
          S_APPLE_KEY_INSTALLER: ${{ secrets.APPLE_KEY_INSTALLER }}
          S_APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          S_APPLE_STORE_PSW: ${{ secrets.APPLE_STORE_PSW }}
          S_APPLE_STORE_USER: ${{ secrets.APPLE_STORE_USER }}
          S_EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          S_EMAIL_USER: ${{ secrets.EMAIL_USER }}
          S_ENV_PROD: ${{ secrets.ENV_PROD }}
          S_ENV_PROD_DELIVERY: ${{ secrets.ENV_PROD_DELIVERY }}
          S_ENV_PROFILE: ${{ secrets.ENV_PROFILE }}
          S_GH_TOKEN: ${{ secrets.GH_TOKEN }}
          S_KEYSTORE: ${{ secrets.KEYSTORE }}
          S_KEYSTORE_ADM: ${{ secrets.KEYSTORE_ADM }}
          S_MACOS_AUTH_P8: ${{ secrets.MACOS_AUTH_P8 }}
          S_MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          S_MACOS_CERT_PSW: ${{ secrets.MACOS_CERT_PSW }}
          S_MACOS_INSTALLER_CERT_PSW: ${{ secrets.MACOS_INSTALLER_CERT_PSW }}
          S_MACOS_P8_KEY_ID: ${{ secrets.MACOS_P8_KEY_ID }}
          S_MACOS_SECRET_PASSWORD: ${{ secrets.MACOS_SECRET_PASSWORD }}
          S_SENHA_API_ALTERAR_URL: ${{ secrets.SENHA_API_ALTERAR_URL }}
          S_SENHA_CERTIFICADO_CLOUDFY: ${{ secrets.SENHA_CERTIFICADO_CLOUDFY }}
          S_SENHA_DEPLOY_DELIVERY: ${{ secrets.SENHA_DEPLOY_DELIVERY }}
          S_SENHA_KEYSTORE: ${{ secrets.SENHA_KEYSTORE }}
          S_SHOREBIRD_KEY: ${{ secrets.SHOREBIRD_KEY }}
          S_SIGNATURE_APP_ID: ${{ secrets.SIGNATURE_APP_ID }}
          S_SIGNATURE_CERTIFICATE_NAME: ${{ secrets.SIGNATURE_CERTIFICATE_NAME }}
          S_SIGNATURE_PASSWORD: ${{ secrets.SIGNATURE_PASSWORD }}
          S_SIGNATURE_TENANT_ID: ${{ secrets.SIGNATURE_TENANT_ID }}
          S_SIGNATURE_VAULT_ID: ${{ secrets.SIGNATURE_VAULT_ID }}
        run: |
          set -uo pipefail

          # Resolve a lista de envs alvo
          case "${{ inputs.target_env }}" in
            both)        ENVS="staging production" ;;
            staging)     ENVS="staging" ;;
            production)  ENVS="production" ;;
          esac
          DRY_RUN="${{ inputs.dry_run }}"
          REPO="cloudfysystems/FLUTTER"

          echo "::notice::Alvo: $ENVS | Dry-run: $DRY_RUN"

          # Lista de pares (nome_destino, nome_da_env_var_origem). Mapeia
          # 1:1 — os destinos têm o mesmo nome no FLUTTER.
          declare -a SECRETS=(
            "APPLE_API_ISSUER_ID:S_APPLE_API_ISSUER_ID"
            "APPLE_API_KEY:S_APPLE_API_KEY"
            "APPLE_API_PRIVATE_KEY:S_APPLE_API_PRIVATE_KEY"
            "APPLE_CERT_BASE64:S_APPLE_CERT_BASE64"
            "APPLE_CERT_PSW:S_APPLE_CERT_PSW"
            "APPLE_KEY_INSTALLER:S_APPLE_KEY_INSTALLER"
            "APPLE_PROVISIONING_PROFILE_BASE64:S_APPLE_PROVISIONING_PROFILE_BASE64"
            "APPLE_STORE_PSW:S_APPLE_STORE_PSW"
            "APPLE_STORE_USER:S_APPLE_STORE_USER"
            "EMAIL_PASS:S_EMAIL_PASS"
            "EMAIL_USER:S_EMAIL_USER"
            "ENV_PROD:S_ENV_PROD"
            "ENV_PROD_DELIVERY:S_ENV_PROD_DELIVERY"
            "ENV_PROFILE:S_ENV_PROFILE"
            "GH_TOKEN:S_GH_TOKEN"
            "KEYSTORE:S_KEYSTORE"
            "KEYSTORE_ADM:S_KEYSTORE_ADM"
            "MACOS_AUTH_P8:S_MACOS_AUTH_P8"
            "MACOS_CERT_BASE64:S_MACOS_CERT_BASE64"
            "MACOS_CERT_PSW:S_MACOS_CERT_PSW"
            "MACOS_INSTALLER_CERT_PSW:S_MACOS_INSTALLER_CERT_PSW"
            "MACOS_P8_KEY_ID:S_MACOS_P8_KEY_ID"
            "MACOS_SECRET_PASSWORD:S_MACOS_SECRET_PASSWORD"
            "SENHA_API_ALTERAR_URL:S_SENHA_API_ALTERAR_URL"
            "SENHA_CERTIFICADO_CLOUDFY:S_SENHA_CERTIFICADO_CLOUDFY"
            "SENHA_DEPLOY_DELIVERY:S_SENHA_DEPLOY_DELIVERY"
            "SENHA_KEYSTORE:S_SENHA_KEYSTORE"
            "SHOREBIRD_KEY:S_SHOREBIRD_KEY"
            "SIGNATURE_APP_ID:S_SIGNATURE_APP_ID"
            "SIGNATURE_CERTIFICATE_NAME:S_SIGNATURE_CERTIFICATE_NAME"
            "SIGNATURE_PASSWORD:S_SIGNATURE_PASSWORD"
            "SIGNATURE_TENANT_ID:S_SIGNATURE_TENANT_ID"
            "SIGNATURE_VAULT_ID:S_SIGNATURE_VAULT_ID"
          )

          TOTAL=${#SECRETS[@]}
          OK=0
          SKIP=0
          ERR=0

          for entry in "${SECRETS[@]}"; do
            dest="${entry%%:*}"
            src="${entry##*:}"
            value="${!src:-}"

            if [ -z "$value" ]; then
              echo "::warning::SKIP $dest (env var $src está vazia no repo Version)"
              SKIP=$((SKIP+1))
              continue
            fi

            for env in $ENVS; do
              if [ "$DRY_RUN" = "true" ]; then
                echo "DRY-RUN -> set $dest @ $env (length=${#value})"
                OK=$((OK+1))
              else
                # gh secret set le stdin quando -b nao eh passado. Usamos
                # printf '%s' pra evitar trailing newline (echo adicionaria \n
                # ao valor, corrompendo certificados/chaves base64).
                if printf '%s' "$value" | gh secret set "$dest" --env "$env" --repo "$REPO" 2>/dev/null; then
                  echo "OK -> $dest @ $env"
                  OK=$((OK+1))
                else
                  echo "::error::FAILED $dest @ $env"
                  ERR=$((ERR+1))
                fi
              fi
            done
          done

          echo ""
          echo "=========================================="
          echo "Sumario: $TOTAL secrets, $OK ok, $SKIP vazios, $ERR erros"
          echo "=========================================="
          [ $ERR -eq 0 ]
