# PodDisruptionBudget — garante que durante voluntary disruptions (drain de
# no, rolling update, scale-down do HPA) sempre haja pelo menos 2 pods
# disponiveis. Combinado com maxUnavailable: 0 no rolling update do
# Deployment, evita janela de zero pods saudaveis.
#
# Substituicao envsubst:
#   ${K8S_NAME}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
    name: ${K8S_NAME}
    labels:
        app: ${K8S_NAME}
spec:
    minAvailable: 2
    selector:
        matchLabels:
            app: ${K8S_NAME}
