# HPA com scale-down conservador (15min sem queda, max 1 pod a cada 10min)
# pra proteger conexoes WebSocket. Combinado com graceful shutdown nativo
# do @cloudfy/corp, o cliente WS tem tempo de reconectar.
#
# Substituicao envsubst:
#   ${K8S_NAME}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
    name: ${K8S_NAME}
    labels:
        app: ${K8S_NAME}
spec:
    scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: ${K8S_NAME}
    minReplicas: 2
    maxReplicas: 5
    metrics:
        - type: Resource
          resource:
              name: cpu
              target:
                  type: Utilization
                  averageUtilization: 70
        - type: Resource
          resource:
              name: memory
              target:
                  type: Utilization
                  averageUtilization: 75
    behavior:
        scaleDown:
            stabilizationWindowSeconds: 900
            policies:
                - type: Pods
                  value: 1
                  periodSeconds: 600
        scaleUp:
            stabilizationWindowSeconds: 30
            policies:
                - type: Pods
                  value: 2
                  periodSeconds: 30
