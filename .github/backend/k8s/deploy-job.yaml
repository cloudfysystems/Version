# Job efemero disparado pelo workflow GHA. Faz git clone do SHA exato,
# pnpm install + pnpm build, e copia os artefatos pro PVC EFS via rsync.
# Apos o Job concluir, o workflow faz `kubectl rollout restart` no Deployment.
#
# K8S_NAME, PVC e IMAGE todos levam ${SUFFIX} em staging — Job efemero
# isolado por env. REPO_URL e GIT_SHA vem do workflow (branch correto).
#
# Substituicoes envsubst antes de `kubectl apply -f -`:
#   ${SHORT_SHA} ${GIT_SHA} ${REPO_URL} ${ECR_REGISTRY} ${APP_NAME} ${K8S_NAME} ${SUFFIX}
apiVersion: batch/v1
kind: Job
metadata:
    name: deploy-${K8S_NAME}-${SHORT_SHA}
    labels:
        app: ${K8S_NAME}
        deploy-job: 'true'
spec:
    backoffLimit: 1
    activeDeadlineSeconds: 1200
    ttlSecondsAfterFinished: 3600
    template:
        metadata:
            labels:
                app: ${K8S_NAME}
                deploy-job: 'true'
        spec:
            restartPolicy: Never
            containers:
                - name: deploy
                  image: ${ECR_REGISTRY}/cloudfysystems/nodejs${APP_NAME}${SUFFIX}:latest
                  workingDir: /workspace
                  env:
                      - name: GIT_SHA
                        value: '${GIT_SHA}'
                      - name: REPO_URL
                        value: '${REPO_URL}'
                      - name: APP_NAME
                        value: '${APP_NAME}'
                      - name: GITHUB_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: gha-deploy
                                key: token
                  command:
                      - /bin/bash
                      - -c
                  args:
                      - |
                          set -euxo pipefail
                          # CRITICO: a imagem base seta NODE_ENV=production, o que
                          # faz pnpm pular devDependencies (incluindo typescript +
                          # @types/*), quebrando o build. Aqui rodamos como dev pra
                          # ter os tipos disponiveis. O pod RUNTIME do Deployment
                          # seta NODE_ENV=production via env: no proprio K8s.
                          unset NODE_ENV
                          git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@${REPO_URL#https://}" .
                          git fetch --depth 1 origin "${GIT_SHA}"
                          git checkout "${GIT_SHA}"
                          # pnpm 10 — alinhado com packageManager field do package.json
                          npm install -g pnpm@10
                          pnpm install --frozen-lockfile
                          pnpm build
                          mkdir -p /pvc/apps/${APP_NAME}/dist /pvc/apps/${APP_NAME}/Reports /pvc/apps/${APP_NAME}/SQL /pvc/apps/${APP_NAME}/temp
                          mkdir -p /pvc/packages/corp/dist /pvc/packages/corp/java-deps
                          # rsync sem -a: EFS Access Point bloqueia chown
                          # (Uid=0,Gid=0 fixos pelo AP). Drop -ogp, mantemos -rlt.
                          RSYNC_OPTS="-rlt --omit-dir-times --delete --no-owner --no-group --no-perms"
                          rsync $RSYNC_OPTS apps/${APP_NAME}/dist/        /pvc/apps/${APP_NAME}/dist/
                          rsync $RSYNC_OPTS apps/${APP_NAME}/Reports/     /pvc/apps/${APP_NAME}/Reports/
                          rsync $RSYNC_OPTS apps/${APP_NAME}/SQL/         /pvc/apps/${APP_NAME}/SQL/
                          rsync $RSYNC_OPTS packages/corp/dist/           /pvc/packages/corp/dist/
                          rsync $RSYNC_OPTS packages/corp/java-deps/      /pvc/packages/corp/java-deps/
                          echo "deploy ok"
                  volumeMounts:
                      - name: pvc
                        mountPath: /pvc
                      - name: workspace
                        mountPath: /workspace
            volumes:
                - name: pvc
                  persistentVolumeClaim:
                      claimName: pvc${K8S_NAME}
                - name: workspace
                  emptyDir:
                      sizeLimit: 5Gi
