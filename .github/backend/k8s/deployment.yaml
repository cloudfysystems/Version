# Deployment do backend. WebSocket-friendly: terminationGracePeriodSeconds
# 60s + preStop hook (5s drain) + readiness probe que detecta /tmp/shutdown.
# K8S_NAME = ${K8S_BASE}${SUFFIX} — em staging vira n03ap01v2-staging.
# IMAGE tambem leva ${SUFFIX} pra apontar pro ECR repo correto.
# Prod e staging coexistem no cluster como Deployments separados.
#
# Substituicao envsubst:
#   ${K8S_NAME} ${APP_NAME} ${ECR_REGISTRY} ${SUFFIX}
apiVersion: apps/v1
kind: Deployment
metadata:
    name: ${K8S_NAME}
    labels:
        app: ${K8S_NAME}
    annotations:
        deployment.kubernetes.io/revision-history-limit: '5'
spec:
    revisionHistoryLimit: 5
    selector:
        matchLabels:
            app: ${K8S_NAME}
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxUnavailable: 0
            maxSurge: 1
    # NOTA: NAO definimos `replicas` aqui de proposito. O HPA assume controle
    # do replicaset; deixar o campo ausente evita que `kubectl apply` resete
    # o numero de pods pra um valor fixo a cada deploy. Na primeira aplicacao,
    # o controller assume o `minReplicas` do HPA (2).
    template:
        metadata:
            labels:
                app: ${K8S_NAME}
        spec:
            terminationGracePeriodSeconds: 60
            containers:
                - name: ${K8S_NAME}
                  image: ${ECR_REGISTRY}/cloudfysystems/nodejs${APP_NAME}${SUFFIX}:latest
                  imagePullPolicy: Always
                  workingDir: /usr/src/app/apps/${APP_NAME}
                  command: ['node', 'dist/Main.js']
                  ports:
                      - containerPort: 3090
                        name: http
                  resources:
                      requests:
                          memory: '2500Mi'
                          cpu: '500m'
                      limits:
                          memory: '3000Mi'
                          cpu: '2000m'
                  env:
                      - name: APP_NAME
                        value: ${K8S_NAME}
                      - name: TZ
                        value: America/Sao_Paulo
                      - name: NODE_ENV
                        value: production
                      - name: SHUTDOWN_GRACE_SECONDS
                        value: '45'
                  lifecycle:
                      preStop:
                          exec:
                              command:
                                  - /bin/sh
                                  - -c
                                  - |
                                      touch /tmp/shutdown
                                      sleep 5
                  livenessProbe:
                      tcpSocket:
                          port: 3090
                      initialDelaySeconds: 60
                      periodSeconds: 30
                      failureThreshold: 3
                  readinessProbe:
                      exec:
                          command:
                              - /bin/sh
                              - -c
                              - '[ ! -f /tmp/shutdown ] && nc -z localhost 3090'
                      initialDelaySeconds: 30
                      periodSeconds: 5
                      failureThreshold: 2
                  volumeMounts:
                      - name: jwtpvc
                        mountPath: /jwt
                      - name: var
                        mountPath: /var/www
                      - name: appdata
                        mountPath: /usr/src/app/apps/${APP_NAME}/dist
                        subPath: apps/${APP_NAME}/dist
                      - name: appdata
                        mountPath: /usr/src/app/apps/${APP_NAME}/Reports
                        subPath: apps/${APP_NAME}/Reports
                      - name: appdata
                        mountPath: /usr/src/app/apps/${APP_NAME}/SQL
                        subPath: apps/${APP_NAME}/SQL
                      - name: appdata
                        mountPath: /usr/src/app/apps/${APP_NAME}/temp
                        subPath: apps/${APP_NAME}/temp
                      - name: appdata
                        mountPath: /usr/src/app/node_modules/@cloudfy/corp/dist
                        subPath: packages/corp/dist
                      - name: appdata
                        mountPath: /usr/src/app/node_modules/@cloudfy/corp/java-deps
                        subPath: packages/corp/java-deps
                      - name: corp-pkgjson
                        mountPath: /usr/src/app/node_modules/@cloudfy/corp/package.json
                        subPath: package.json
                      - name: app-pkgjson
                        mountPath: /usr/src/app/apps/${APP_NAME}/package.json
                        subPath: package.json
                      - name: conf
                        mountPath: /usr/src/app/apps/${APP_NAME}/conf
                        readOnly: true
            volumes:
                - name: jwtpvc
                  persistentVolumeClaim:
                      claimName: jwtpvc
                - name: var
                  persistentVolumeClaim:
                      claimName: frontendpvc
                - name: appdata
                  persistentVolumeClaim:
                      claimName: pvc${K8S_NAME}
                - name: corp-pkgjson
                  configMap:
                      name: ${K8S_NAME}-pkgjson-corp
                - name: app-pkgjson
                  configMap:
                      name: ${K8S_NAME}-pkgjson-app
                - name: conf
                  secret:
                      secretName: ${K8S_NAME}-conf
