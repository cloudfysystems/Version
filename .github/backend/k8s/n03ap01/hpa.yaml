# HPA com scale-down CONSERVADOR pra proteger conexoes WebSocket:
# - 15min sem queda de carga antes de avaliar derrubar pod
# - Maximo 1 pod a cada 10min
# Combinado com terminationGracePeriodSeconds: 60 + preStop hook (5s drain)
# + graceful shutdown nativo do @cloudfy/corp (StartUp.Shutdown), o cliente
# WS tem tempo de reconectar em outro pod antes do encerramento.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
    name: n03ap01v2
    labels:
        app: n03ap01v2
spec:
    scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: n03ap01v2
    minReplicas: 2
    maxReplicas: 5
    metrics:
        - type: Resource
          resource:
              name: cpu
              target:
                  type: Utilization
                  averageUtilization: 70
        - type: Resource
          resource:
              name: memory
              target:
                  type: Utilization
                  averageUtilization: 75
    behavior:
        scaleDown:
            stabilizationWindowSeconds: 900
            policies:
                - type: Pods
                  value: 1
                  periodSeconds: 600
        scaleUp:
            stabilizationWindowSeconds: 30
            policies:
                - type: Pods
                  value: 2
                  periodSeconds: 30
