# Deployment do n03ap01v2. Substitui o DaemonSet legado (NodePM2 cluster).
# replicas: 2 e o valor INICIAL — o HPA assume controle e escala 2..5.
# WebSocket-friendly: terminationGracePeriodSeconds: 60 + preStop hook
# (5s de drain) + readiness probe que detecta /tmp/shutdown. Combinado
# com o graceful shutdown do StartUp.ts (corp), conexoes WS sao fechadas
# com codigo 1001 e clientes reconectam em pods saudaveis.
#
# Substituicao envsubst antes de `kubectl apply -f -`:
#   ${ECR_REGISTRY}
apiVersion: apps/v1
kind: Deployment
metadata:
    name: n03ap01v2
    labels:
        app: n03ap01v2
    annotations:
        deployment.kubernetes.io/revision-history-limit: '5'
spec:
    revisionHistoryLimit: 5
    selector:
        matchLabels:
            app: n03ap01v2
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxUnavailable: 0
            maxSurge: 1
    # NOTA: NAO definimos `replicas` aqui de proposito. O HPA assume controle
    # do replicaset; deixar o campo ausente evita que `kubectl apply` resete
    # o numero de pods pra um valor fixo a cada deploy. Na primeira aplicacao,
    # o controller assume o `minReplicas` do HPA (2).
    template:
        metadata:
            labels:
                app: n03ap01v2
        spec:
            # 60s e suficiente: preStop sinaliza shutdown (5s pro readiness
            # tirar pod do Service), depois SIGTERM dispara StartUp.Shutdown
            # que fecha WS com close 1001 (cliente reconecta em outro pod).
            terminationGracePeriodSeconds: 60
            containers:
                - name: n03ap01v2
                  image: ${ECR_REGISTRY}/cloudfysystems/nodejsn03ap01:latest
                  imagePullPolicy: Always
                  workingDir: /usr/src/app/apps/n03ap01
                  command: ['node', 'dist/Main.js']
                  ports:
                      - containerPort: 3090
                        name: http
                  resources:
                      requests:
                          memory: '2500Mi'
                          cpu: '500m'
                      limits:
                          memory: '3000Mi'
                          cpu: '2000m'
                  env:
                      - name: APP_NAME
                        value: DeliveryApiV2
                      - name: TZ
                        value: America/Sao_Paulo
                      - name: NODE_ENV
                        value: production
                      - name: SHUTDOWN_GRACE_SECONDS
                        value: '45'
                  lifecycle:
                      preStop:
                          exec:
                              # Marca pod como "draining" — readinessProbe ve
                              # /tmp/shutdown e tira pod do Service. 5s da tempo
                              # pro endpoint controller propagar. Depois SIGTERM
                              # dispara StartUp.Shutdown (corp) que fecha WS
                              # com close 1001 e Server.close() das HTTP em voo.
                              command:
                                  - /bin/sh
                                  - -c
                                  - |
                                      touch /tmp/shutdown
                                      sleep 5
                  livenessProbe:
                      tcpSocket:
                          port: 3090
                      initialDelaySeconds: 60
                      periodSeconds: 30
                      failureThreshold: 3
                  readinessProbe:
                      exec:
                          # Falha durante drain (readiness=false → fora do Service).
                          command:
                              - /bin/sh
                              - -c
                              - '[ ! -f /tmp/shutdown ] && nc -z localhost 3090'
                      initialDelaySeconds: 30
                      periodSeconds: 5
                      failureThreshold: 2
                  volumeMounts:
                      - name: jwtpvc
                        mountPath: /jwt
                      - name: var
                        mountPath: /var/www
                      - name: appdata
                        mountPath: /usr/src/app/apps/n03ap01/dist
                        subPath: apps/n03ap01/dist
                      - name: appdata
                        mountPath: /usr/src/app/apps/n03ap01/Reports
                        subPath: apps/n03ap01/Reports
                      - name: appdata
                        mountPath: /usr/src/app/apps/n03ap01/SQL
                        subPath: apps/n03ap01/SQL
                      - name: appdata
                        mountPath: /usr/src/app/apps/n03ap01/temp
                        subPath: apps/n03ap01/temp
                      - name: appdata
                        mountPath: /usr/src/app/node_modules/@cloudfy/corp/dist
                        subPath: packages/corp/dist
                      - name: appdata
                        mountPath: /usr/src/app/node_modules/@cloudfy/corp/java-deps
                        subPath: packages/corp/java-deps
                      - name: corp-pkgjson
                        mountPath: /usr/src/app/node_modules/@cloudfy/corp/package.json
                        subPath: package.json
                      - name: app-pkgjson
                        mountPath: /usr/src/app/apps/n03ap01/package.json
                        subPath: package.json
                      - name: conf
                        mountPath: /usr/src/app/apps/n03ap01/conf
                        readOnly: true
            volumes:
                - name: jwtpvc
                  persistentVolumeClaim:
                      claimName: jwtpvc
                - name: var
                  persistentVolumeClaim:
                      claimName: frontendpvc
                - name: appdata
                  persistentVolumeClaim:
                      claimName: pvcn03ap01v2
                - name: corp-pkgjson
                  configMap:
                      name: n03ap01v2-pkgjson-corp
                - name: app-pkgjson
                  configMap:
                      name: n03ap01v2-pkgjson-app
                - name: conf
                  secret:
                      secretName: n03ap01v2-conf
